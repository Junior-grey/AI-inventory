<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <!-- Rounded container representing the app's logo bg -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#grad)" />
  <!-- Cpu details (inspired by Lucide Cpu style) -->
  <g fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <rect x="128" y="128" width="256" height="256" rx="48" stroke-width="36" />
    <path d="M192 128v-48" />
    <path d="M256 128v-48" />
    <path d="M320 128v-48" />
    <path d="M192 384v48" />
    <path d="M256 384v48" />
    <path d="M320 384v48" />
    <path d="M128 192H80" />
    <path d="M128 256H80" />
    <path d="M128 320H80" />
    <path d="M384 192h48" />
    <path d="M384 256h48" />
    <path d="M384 320h48" />
    <!-- Core of the CPU -->
    <rect x="200" y="200" width="112" height="112" rx="20" fill="#ffffff" opacity="0.2" stroke-width="24" />
  </g>
</svg>
